<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>noncent — GitHub Repository Dashboard</title>
  <meta name="description" content="Welcome to noncent's open-source portfolio. Browse 50+ public and private repositories." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=2" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("noncent-theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme (T)">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
  </button>

  <header class="hero">
    <div class="hero-banner-wrap">
      <img class="hero-banner" src="assets/hero-welcome.png" alt="" />
      <div class="hero-banner-overlay"></div>
    </div>
    <div class="hero-inner">
      <div class="hero-badge">GitHub portfolio</div>
      <h1 class="hero-title">Welcome, <span class="grad">noncent</span></h1>
      <p class="hero-tagline">Architect · builder · open-source contributor. Explore my repositories below.</p>
      <div id="stats" class="stats-row"></div>
      <div class="hero-links">
        <a class="btn btn-primary" href="https://github.com/noncent" target="_blank" rel="noopener">GitHub profile</a>
        <a class="btn btn-ghost" href="https://noncent.github.io/promptvault/" target="_blank" rel="noopener">PromptVault</a>
      </div>
    </div>
  </header>

  <section class="toolbar-wrap">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="search" type="search" placeholder="Search repos…" autocomplete="off" spellcheck="false" aria-label="Search repositories" />
      <kbd class="search-kbd">/</kbd>
    </div>
    <div id="chips" class="chips" role="tablist" aria-label="Filter repositories"></div>
  </section>

  <main class="main">
    <div id="featured" class="featured"></div>
    <div id="grid" class="repo-grid" role="list"></div>
    <div id="empty" class="empty hidden">
      <p>No repositories match that filter.</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>Data synced from GitHub · <a href="https://github.com/noncent/noncent.github.io" target="_blank" rel="noopener">View source</a></p>
    <p class="footer-note">Private repos are listed but not publicly accessible.</p>
  </footer>

  <script src="app.js?v=1"></script>
</body>
</html>
